name: Garupa Master sync

on:
  workflow_dispatch: {}
  schedule:
    - cron: "16 8 * * 0"

permissions:
  contents: read

concurrency:
  group: garupa-master-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Fetch, decode, and publish the complete Master
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PACKAGE_ID: jp.co.craftegg.band
      APKEEP_VERSION: 1.0.0
      IL2CPP_DUMPER_VERSION: 6.7.46
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
      PYTHONPATH: scripts
      R2_BUCKET: hotdori-assets

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install the R2 client
        run: python -m pip install --disable-pip-version-check boto3==1.43.47

      - name: Set up .NET for Il2CppDumper
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "6.0.x"

      - name: Prepare runtime workspace
        run: |
          mkdir -p \
            "$RUNNER_TEMP/garupa-apk-download" \
            "$RUNNER_TEMP/garupa-package" \
            "$RUNNER_TEMP/garupa-il2cpp-input" \
            "$RUNNER_TEMP/garupa-il2cpp-dump" \
            "$RUNNER_TEMP/garupa-runtime-schema" \
            "$RUNNER_TEMP/garupa-master" \
            "$RUNNER_TEMP/garupa-projections"

      - name: Download apkeep
        run: |
          curl --fail --location --retry 5 \
            --output "$RUNNER_TEMP/apkeep" \
            "https://github.com/EFForg/apkeep/releases/download/${APKEEP_VERSION}/apkeep-x86_64-unknown-linux-gnu"
          chmod 755 "$RUNNER_TEMP/apkeep"

      - name: Download the latest Garupa package
        id: package
        run: |
          "$RUNNER_TEMP/apkeep" \
            --app "$PACKAGE_ID" \
            --download-source apk-pure \
            --options 'arch=arm64-v8a' \
            --parallel 1 \
            "$RUNNER_TEMP/garupa-apk-download"

          package_path="$(
            find "$RUNNER_TEMP/garupa-apk-download" -maxdepth 1 -type f \
              \( -name '*.apk' -o -name '*.xapk' \) \
              -print -quit
          )"
          echo "path=$package_path" >> "$GITHUB_OUTPUT"

      - name: Prepare the package and read its version
        id: package_info
        env:
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
        run: |
          android_sdk="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          apkanalyzer="$(
            find "$android_sdk" -type f -name apkanalyzer -print |
              sort |
              tail -n 1
          )"
          selection="$RUNNER_TEMP/garupa-package-selection.json"
          python -m scripts.garupa_master prepare-package \
            --package "$PACKAGE_PATH" \
            --output-dir "$RUNNER_TEMP/garupa-package" \
            --selection "$selection" \
            --package-name "$PACKAGE_ID"

          base_apk="$(jq -er .baseApk "$selection")"
          version="$("$apkanalyzer" manifest version-name "$base_apk")"
          echo "base_apk=$base_apk" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract IL2CPP inputs
        id: il2cpp
        env:
          BASE_APK: ${{ steps.package_info.outputs.base_apk }}
          PACKAGE_PATH: ${{ steps.package.outputs.path }}
        run: |
          metadata_entry="assets/bin/Data/Managed/Metadata/global-metadata.dat"
          native_entry="lib/arm64-v8a/libil2cpp.so"
          metadata="$RUNNER_TEMP/garupa-il2cpp-input/global-metadata.dat"
          native="$RUNNER_TEMP/garupa-il2cpp-input/libil2cpp.so"

          unzip -p "$BASE_APK" "$metadata_entry" > "$metadata"
          native_apk=""
          while IFS= read -r -d '' apk; do
            if unzip -Z1 "$apk" | grep -Fqx "$native_entry"; then
              native_apk="$apk"
              break
            fi
          done < <(
            if [[ "$BASE_APK" == "$PACKAGE_PATH" ]]; then
              printf '%s\0' "$BASE_APK"
            else
              find "$RUNNER_TEMP/garupa-package" -maxdepth 1 \
                -type f -name '*.apk' -print0
            fi
          )
          unzip -p "$native_apk" "$native_entry" > "$native"

          echo "metadata=$metadata" >> "$GITHUB_OUTPUT"
          echo "native=$native" >> "$GITHUB_OUTPUT"

      - name: Download Il2CppDumper
        run: |
          curl --fail --location --retry 5 \
            --output "$RUNNER_TEMP/Il2CppDumper.zip" \
            "https://github.com/Perfare/Il2CppDumper/releases/download/v${IL2CPP_DUMPER_VERSION}/Il2CppDumper-net6-v${IL2CPP_DUMPER_VERSION}.zip"
          mkdir -p "$RUNNER_TEMP/Il2CppDumper"
          unzip -q "$RUNNER_TEMP/Il2CppDumper.zip" \
            -d "$RUNNER_TEMP/Il2CppDumper"
          jq '.RequireAnyKey = false' \
            "$RUNNER_TEMP/Il2CppDumper/config.json" \
            > "$RUNNER_TEMP/Il2CppDumper/config.ci.json"
          mv "$RUNNER_TEMP/Il2CppDumper/config.ci.json" \
            "$RUNNER_TEMP/Il2CppDumper/config.json"

      - name: Generate the runtime schema
        env:
          METADATA_PATH: ${{ steps.il2cpp.outputs.metadata }}
          NATIVE_PATH: ${{ steps.il2cpp.outputs.native }}
        run: |
          (
            cd "$RUNNER_TEMP/Il2CppDumper"
            dotnet Il2CppDumper.dll \
              "$NATIVE_PATH" \
              "$METADATA_PATH" \
              "$RUNNER_TEMP/garupa-il2cpp-dump"
          )
          python -m scripts.garupa_master schema-candidate \
            --dump-cs "$RUNNER_TEMP/garupa-il2cpp-dump/dump.cs" \
            --output "$RUNNER_TEMP/garupa-runtime-schema/schema.json"

      - name: Fetch, decode, and project the current Master
        env:
          REQUEST_CLIENT_VERSION: ${{ steps.package_info.outputs.version }}
        run: |
          python -m scripts.garupa_master sync \
            --schema "$RUNNER_TEMP/garupa-runtime-schema/schema.json" \
            --request-client-version "$REQUEST_CLIENT_VERSION" \
            --output-dir "$RUNNER_TEMP/garupa-master" \
            --projection-dir "$RUNNER_TEMP/garupa-projections"

      - name: Publish CAS objects and switch the current pointer
        run: |
          python -m scripts.garupa_master publish-r2 \
            --archive-dir "$RUNNER_TEMP/garupa-master" \
            --schema-dir "$RUNNER_TEMP/garupa-runtime-schema" \
            --projection-dir "$RUNNER_TEMP/garupa-projections" \
            --server jp \
            --concurrency 64
