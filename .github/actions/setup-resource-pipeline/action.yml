name: Set up resource pipeline
description: Install Python and cached pipeline dependencies.

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
        cache: pip
        cache-dependency-path: scripts/requirements.in
    - name: Install pipeline dependencies
      shell: bash
      run: python -m pip install --disable-pip-version-check --requirement scripts/requirements.in
